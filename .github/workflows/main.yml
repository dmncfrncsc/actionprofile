name: BuildWF
on:
    push:
       branches:
          - main
    pull_request:
        branches:
          - main
    
    workflow_dispatch:
    
    schedule:
        - cron: '10 14 * * 1-5'

permissions:
    contents: read
   
      
jobs:
    Build:
        runs-on: ubuntu-latest
        steps:
            - name: Code checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Maven Build
              run: mvn install

            - name: Upload Build Artifact (WAR)
              uses: actions/upload-artifact@v4
              with:
                name: vprofile-app
                path: target/*.war

            - name: Notify if Build Fails
              if: failure()
              run: echo "Build failed! Please check the logs for details."

    Testing:
        runs-on: ubuntu-latest
        needs: Build
        steps:
            - name: Code checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Run tests on main branch
              if: github.ref == 'refs/heads/main'
              run: mvn test
            
            - name: Checkstyle
              if: github.ref == 'refs/heads/main'
              run: mvn checkstyle:check -Dcheckstyle.failOnViolation=false -Dcheckstyle.failsOnError=false
            

            - name: Run tests on other branches
              if: github.ref != 'refs/heads/main'
              run: echo "Skipping unit test and code analysis for non-main branches."


    Security_Scan:
        runs-on: ubuntu-latest
        needs: Build
        steps:
            - name: Code checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Run Trivy file system scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: fs
                scan-refs: .
                format: json
                exit-code: 0
                vuln-type: os,library
                output: trivy-report.json

            - name: Upload Trivy Scan results as artifact
              uses: actions/upload-artifact@v4
              with:
                name: trivy-scan-results
                path: trivy-report.json