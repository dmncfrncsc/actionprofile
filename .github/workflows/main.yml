name: BuildWF
on:
    push:
       branches:
          - main
    pull_request:
        branches:
          - main
    
    workflow_dispatch:
    
    schedule:
        - cron: '10 14 * * 1-5'
env:
    ECR_REPOSITORY: 'vprofile-appimage'

permissions:
    contents: read
   
      
jobs:
    Build:
        runs-on: ubuntu-latest
        steps:
            - name: Code checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Maven Build
              run: mvn install

            - name: Upload Build Artifact (WAR)
              uses: actions/upload-artifact@v4
              with:
                name: vprofile-app
                path: target/*.war

            - name: Notify if Build Fails
              if: failure()
              run: echo "Build failed! Please check the logs for details."

    Testing:
        runs-on: ubuntu-latest
        needs: Build
        steps:
            - name: Code checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Run tests on main branch
              if: github.ref == 'refs/heads/main'
              run: mvn test
            
            - name: Checkstyle
              if: github.ref == 'refs/heads/main'
              run: mvn checkstyle:check -Dcheckstyle.failOnViolation=false -Dcheckstyle.failsOnError=false
            

            - name: Run tests on other branches
              if: github.ref != 'refs/heads/main'
              run: echo "Skipping unit test and code analysis for non-main branches."


    Security_Scan:
        runs-on: ubuntu-latest
        needs: Build
        steps:
            - name: Code checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Run Trivy file system scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: fs
                scan-refs: .
                format: json
                exit-code: 0
                vuln-type: os,library
                output: trivy-report.json

            - name: Upload Trivy Scan results as artifact
              uses: actions/upload-artifact@v4
              with:
                name: trivy-scan-results
                path: trivy-report.json

    BUILD_AND_PUBLISH:
      name: BUILD_AND_PUBLISH
      runs-on: ubuntu-latest
      environment: production
      needs: [Build, Testing, Security_Scan]
      if: github.ref == 'refs/heads/main'
      steps:
        - name: Code checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0
        
        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v3
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ vars.AWS_REGION }}

        - name: Log in to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: Build, tag, and push image to Amazon ECR
          id: build-image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            IMAGE_TAG: ${{ github.sha }}
          run: |
            docker build -f Docker-files/app/multistage/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV